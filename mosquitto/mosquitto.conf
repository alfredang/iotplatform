# Mosquitto broker configuration for the IoT platform (development defaults).
#
# Anonymous access is enabled for easy local testing. For production, create a
# password file and set `allow_anonymous false` + `password_file`.

listener 1883
allow_anonymous true

# Optional WebSocket listener (useful for browser-based MQTT clients).
listener 9001
protocol websockets

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type warning
